name: _promote

on:
  workflow_call:
    inputs:
      image_tag:
        type: string
        required: true

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
  AR_IMAGE_PATH: ${{ vars.AR_IMAGE_PATH }}

jobs:
  promote-stable:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Promote to :stable tag
        run: |
          echo "Promoting ${AR_IMAGE_PATH}:${{ inputs.image_tag }} -> ${AR_IMAGE_PATH}:stable"
          gcloud artifacts docker tags add \
            "${AR_IMAGE_PATH}:${{ inputs.image_tag }}" \
            "${AR_IMAGE_PATH}:stable" \
            --quiet
          echo "Stable tag updated."